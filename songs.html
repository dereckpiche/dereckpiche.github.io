<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dereck's Website</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<h1>Music</h1>
<div class="album">
  <div class="album-head">
    <span class="album-title">Beyond Zeropolis (work in progress)</span>
  </div>
  <div class="songs">
    <div class="song">
      <div class="song-head">
        <span class="track-num">1.</span>
        <span class="song-name">Fasten</span>
      </div>
      <div class="recordings"></div>
    </div>

    <div class="song">
      <div class="song-head">
        <span class="track-num">2.</span>
        <span class="song-name">Aeolian</span>
      </div>
      <div class="recordings"></div>
    </div>

    <div class="song">
      <div class="song-head">
        <span class="track-num">3.</span>
        <span class="song-name">Sonnet</span>
      </div>
      <div class="recordings"></div>
    </div>

    <div class="song">
      <div class="song-head">
        <span class="track-num">4.</span>
        <span class="song-name">Oblivion</span>
      </div>
      <div class="recordings">
        <div class="recording">
          <iframe class="sc-player" allow="autoplay" scrolling="no" frameborder="no"
            src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/dereck-piche/oblivion-acoustic-demo&color=%23e8c49a&visual=false&show_artwork=false&show_user=false&show_comments=false&download=false&sharing=false&buying=false&auto_play=false"></iframe>
        </div>
      </div>
    </div>

    <div class="song">
      <div class="song-head">
        <span class="track-num">5.</span>
        <span class="song-name">Ceremir</span>
      </div>
      <div class="recordings">
        <div class="recording">
          <iframe class="sc-player" allow="autoplay" scrolling="no" frameborder="no"
            src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/dereck-piche/dereck-piche-ceremir-acoustic&color=%23e8c49a&visual=false&show_artwork=false&show_user=false&show_comments=false&download=false&sharing=false&buying=false&auto_play=false"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<p><a href="index.html">&larr; back</a></p>

<script>
Array.prototype.slice.call(document.querySelectorAll('.song')).forEach(function (song) {
  var list = song.querySelector('.recordings');
  if (!list.querySelector('.recording')) {
    var note = document.createElement('span');
    note.className = 'track-note';
    note.textContent = 'no public recording yet';
    list.appendChild(note);
  }
});
</script>
</body>
</html>
